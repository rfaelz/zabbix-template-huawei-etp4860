              expression: 'last(/Huawei ETP4860 Power System SNMP/rect.oper.status[{#SNMPINDEX}])=8'
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: 'last(/Huawei ETP4860 Power System SNMP/rect.oper.status[{#SNMPINDEX}])=1'
              priority: HIGH
              description: 'hwRectOperStatus = acOff(8). AC input to this rectifier module is lost.'
              tags:
                - tag: component
                  value: rectifier
                - tag: scope
                  value: availability
            - uuid: f7e2af9dc7ab4164858e4c6f1cdcb2fd
              name: 'Rectifier {#RECTNAME}: In protection or off'
              expression: |
                last(/Huawei ETP4860 Power System SNMP/rect.oper.status[{#SNMPINDEX}])=3
                or last(/Huawei ETP4860 Power System SNMP/rect.oper.status[{#SNMPINDEX}])=5
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: 'last(/Huawei ETP4860 Power System SNMP/rect.oper.status[{#SNMPINDEX}])=1'
              priority: WARNING
              description: 'hwRectOperStatus = protect(3) or switchOff(5). Recommended: add a manual dependency on trigger "Battery discharging" via the Zabbix UI after import (YAML import cannot resolve this dependency — Zabbix importer limitation).'
              tags:
                - tag: component
                  value: rectifier
                - tag: scope
                  value: availability
            - uuid: 6989ecf2412b433abc678100246fcf67
              name: 'Rectifier {#RECTNAME}: High temperature (>{$RECT.TEMP.MAX}°C)'
              expression: 'min(/Huawei ETP4860 Power System SNMP/rect.temperature[{#SNMPINDEX}],#3)>{$RECT.TEMP.MAX}'
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: 'min(/Huawei ETP4860 Power System SNMP/rect.temperature[{#SNMPINDEX}],#3)<={$RECT.TEMP.MAX}'

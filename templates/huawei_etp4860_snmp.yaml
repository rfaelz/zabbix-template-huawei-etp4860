              key: 'rect.output.current[{#SNMPINDEX}]'
              delay: '60s'
              history: '7d'
              trends: '365d'
              value_type: FLOAT
              units: A
              description: 'hwRectOutputCurrent. Raw ÷ 10 = A.'
              tags:
                - tag: component
                  value: rectifier
                - tag: scope
                  value: performance
              preprocessing:
                - type: MULTIPLIER
                  parameters:
                    - '0.1'
                - type: IN_RANGE
                  parameters:
                    - '0'
                    - '300'
                  error_handler: DISCARD_VALUE
            - uuid: ip000000000000000000000000000004
              name: 'Retificador {#RECTNAME}: Tensão de saída CC'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.2011.6.164.1.3.2.2.1.3.{#SNMPINDEX}'
              key: 'rect.output.voltage[{#SNMPINDEX}]'
              delay: '60s'
              history: '7d'
              trends: '365d'

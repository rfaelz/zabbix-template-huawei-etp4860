            - uuid: 3a47aacbb0164fd7a1bd0fb6144bc24c
              name: 'Rectifier {#RECTNAME}: Critical fault (fault/commFail/rectLost)'
              expression: |
                last(/Huawei ETP4860 Power System SNMP/rect.oper.status[{#SNMPINDEX}])=2
                or last(/Huawei ETP4860 Power System SNMP/rect.oper.status[{#SNMPINDEX}])=4
                or last(/Huawei ETP4860 Power System SNMP/rect.oper.status[{#SNMPINDEX}])=9

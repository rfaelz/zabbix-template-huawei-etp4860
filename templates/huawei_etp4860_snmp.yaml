                  parameters:
                    - '0.1'
                - type: IN_RANGE
                  parameters:
                    - '0'
                    - '65'
                  error_handler: DISCARD_VALUE
            - uuid: ip000000000000000000000000000005
              name: 'Retificador {#RECTNAME}: Potência CC de saída'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.2011.6.164.1.3.2.2.1.5.{#SNMPINDEX}'
              key: 'rect.dc.power[{#SNMPINDEX}]'
              delay: '60s'
              history: '7d'
              trends: '365d'

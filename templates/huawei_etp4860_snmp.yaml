            - uuid: ip000000000000000000000000000006
              name: 'Retificador {#RECTNAME}: Tensão CA de entrada'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.2011.6.164.1.3.2.2.1.6.{#SNMPINDEX}'

---
zabbix_export:
  version: '7.0'
  template_groups:
    - uuid: 7df96bfa3d1f4b1b8b7c1f5a8b6d4321
      name: Templates/Power
  templates:
    - uuid: 7ceb875881b24bcd8f9e86766d5ca36f
      template: Huawei ETP4860 Power System SNMP
      name: Huawei ETP4860 Power System SNMP
      description: |-
        Zabbix 7.0 template for the Huawei ETP4860-B1A2 DC power system (iSitePower controller).
        Compatible with SNMPv1/v2c/v3. MIB root: hwSiteMonitorMIB (1.3.6.1.4.1.2011.6.164).
        Tested firmware: iSitePower V100R022C00SPC121.

        All OIDs are numeric — no MIB files required on the Zabbix server.
        Low-Level Discovery covers rectifier modules, battery strings, AC/DC distribution,
        LVD branches, environment sensors and digital inputs. LLD macros expose
        device-assigned names ({#RECTNAME}, {#BATTNAME}, {#ACNAME}, {#DCNAME}, etc.).

        Firmware sentinel 2147483647 (INT32_MAX) is mapped to 0 on all measurement items
        so graphs stay continuous during AC outages. Rectifier protection/off alerts are
        suppressed while the battery is discharging. Backup time is reported in hours
        (firmware behaviour, despite MIB documenting minutes).

        Source MIBs: EMAP-MIB (emap_snmp.mib) + HUAWEI-MIB.
        Repository: https://github.com/rfaelz/zabbix-template-huawei-etp4860
        Created with Claude Code (Anthropic).
      groups:
        - name: Templates/Power
      macros:
        - macro: '{$SNMP.TIMEOUT}'
          value: '5m'
          type: TEXT
          description: 'Duration without SNMP data before declaring the device unreachable.'
        - macro: '{$VDC.MIN}'
          value: '47'
          type: TEXT
          description: 'DC bus lower voltage alarm threshold (V). Default 47 V.'
        - macro: '{$VDC.MAX}'
          value: '58'
          type: TEXT
          description: 'DC bus upper voltage alarm threshold (V). Default 58 V.'
        - macro: '{$RECT.TEMP.MAX}'
          value: '60'
          type: TEXT
          description: 'Rectifier module max temperature alarm threshold (°C). Default 60 °C.'
        - macro: '{$BATT.SOC.MIN}'
          value: '30'
          type: TEXT
          description: 'Battery group minimum State-of-Charge alarm threshold (%). Default 30 %.'
        - macro: '{$BATT.BACKUP.MIN}'
          value: '1'
          type: TEXT
          description: 'Battery group minimum backup time alarm threshold (h). Default 1 h. Note: firmware reports hwBattsPreDischargeTime in hours despite MIB stating minutes.'
        - macro: '{$BATT.TEMP.MAX}'
          value: '40'
          type: TEXT
          description: 'Battery string maximum temperature alarm threshold (°C). Default 40 °C.'
        - macro: '{$AC.VOLT.MIN}'
          value: '195'
          type: TEXT
          description: 'AC per-phase minimum voltage alarm threshold (V). Default 195 V.'
        - macro: '{$AC.VOLT.MAX}'
          value: '265'
          type: TEXT
          description: 'AC per-phase maximum voltage alarm threshold (V). Default 265 V.'
        - macro: '{$ENV.TEMP.MAX}'
          value: '45'
          type: TEXT
          description: 'Environment temperature sensor max alarm threshold (°C). Default 45 °C.'
        - macro: '{$ENV.TEMP.MIN}'
          value: '5'
          type: TEXT
          description: 'Environment temperature sensor min alarm threshold (°C). Default 5 °C.'
        - macro: '{$LLD.INTERVAL}'
          value: '1h'
          type: TEXT
          description: 'Low-Level Discovery polling interval.'
      tags:
        - tag: class
          value: power
        - tag: target
          value: huawei-etp4860
      valuemaps:
        - uuid: c435780679164a3d94bb6a11e20b0e40
          name: 'Huawei ETP4860: hwSiteRunningStatus'
          mappings:
            - value: '1'
              newvalue: Normal
            - value: '2'
              newvalue: Alarm
        - uuid: 57aa2652399040058285bd126c5a780c
          name: 'Huawei ETP4860: hwMonitorOperStatus'
          mappings:
            - value: '1'
              newvalue: Normal
            - value: '2'
              newvalue: RS485 Fault
            - value: '3'
              newvalue: Network Fault
            - value: '4'
              newvalue: Falha
            - value: '254'
              newvalue: Alarm Restored
            - value: '255'
              newvalue: Unknown
        - uuid: 82e2f472d9664baba74490bb4dcdd76b
          name: 'Huawei ETP4860: hwRectOperStatus'
          mappings:
            - value: '1'
              newvalue: Normal
            - value: '2'
              newvalue: Falha
            - value: '3'
              newvalue: Protection
            - value: '4'
              newvalue: Comm Fault
            - value: '5'
              newvalue: Off
            - value: '6'
              newvalue: Invalid
            - value: '7'
              newvalue: Not Configured
            - value: '8'
              newvalue: AC Absent
            - value: '9'
              newvalue: Module Lost
            - value: '254'
              newvalue: Alarm Restored
            - value: '255'
              newvalue: Unknown
        - uuid: d083835a4c3b406fba6c2f3c224571ea
          name: 'Huawei ETP4860: hwBattsChargeStatus'
          mappings:
            - value: '1'
              newvalue: Float
            - value: '2'
              newvalue: Equalize
            - value: '3'
              newvalue: Discharge
            - value: '4'
              newvalue: Hibernate
            - value: '7'
              newvalue: Offline
            - value: '255'
              newvalue: Unknown
        - uuid: 9141f945a8da4d8297984b144c0da550
          name: 'Huawei ETP4860: hwBattStringOperStatus'
          mappings:
            - value: '1'
              newvalue: Normal
            - value: '2'
              newvalue: High Temperature
            - value: '3'
              newvalue: Low Temperature
            - value: '4'
              newvalue: Open Circuit
            - value: '5'
              newvalue: Overcurrent
            - value: '6'
              newvalue: Imbalance
            - value: '7'
              newvalue: Discharge
            - value: '8'
              newvalue: Blown Fuse
            - value: '254'
              newvalue: Alarm Restored
            - value: '255'
              newvalue: Unknown
        - uuid: 242746e85dbd4a3fa796d931f3f07821
          name: 'Huawei ETP4860: hwAcInputOperStatus'
          mappings:
            - value: '1'
              newvalue: Normal
            - value: '2'
              newvalue: AC Off
            - value: '3'
              newvalue: Phase Absent
            - value: '4'
              newvalue: High Voltage
            - value: '5'
              newvalue: Low Voltage
            - value: '6'
              newvalue: High Frequency
            - value: '7'
              newvalue: Low Frequency
            - value: '254'
              newvalue: Alarm Restored
            - value: '255'
              newvalue: Unknown
        - uuid: cf34064fcf6b47ada1297c5875d30d7a
          name: 'Huawei ETP4860: hwDcOutputOperStatus'
          mappings:
            - value: '1'
              newvalue: Normal
            - value: '2'
              newvalue: High Voltage
            - value: '3'
              newvalue: Low Voltage
            - value: '4'
              newvalue: DC Absent
            - value: '5'
              newvalue: Overload
            - value: '254'
              newvalue: Alarm Restored
            - value: '255'
              newvalue: Unknown
        - uuid: 885db7b806684b0c8ef5b1c1d338a59f
          name: 'Huawei ETP4860: hwLvdBranchOperStatus'
          mappings:
            - value: '1'
              newvalue: Normal
            - value: '2'
              newvalue: Disconnected (Low Voltage)
            - value: '3'
              newvalue: Disconnected (Remote)
            - value: '4'
              newvalue: Disconnected (Local Manual)
            - value: '5'
              newvalue: Disconnected (Low Temp)
            - value: '6'
              newvalue: Disconnected (High Temp)
            - value: '7'
              newvalue: Disconnected (Timer)
            - value: '8'
              newvalue: Disconnected (Capacity)
            - value: '9'
              newvalue: Disconnected (Forced)
            - value: '254'
              newvalue: Alarm Restored
            - value: '255'
              newvalue: Unknown
      # ------------------------------------------------------------------ #
      # SCALAR ITEMS                                                        #
      # ------------------------------------------------------------------ #
      items:
        # -- System / Availability --
        - uuid: 7ce7f5cfdae7484fa48d20c7b974458b
          name: 'System uptime'
          type: SNMP_AGENT
          snmp_oid: '1.3.6.1.2.1.1.3.0'
          key: sys.uptime
          delay: '60s'
          history: '7d'
          trends: '365d'
          value_type: FLOAT
          units: uptime
          description: 'sysUpTime (MIB-2). Converted to seconds (TimeTicks ÷ 100).'
          tags:
            - tag: component
              value: system
            - tag: scope
              value: availability
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '0.01'
          triggers:
            - uuid: b81376e787344fbb8435ce969b6ff0fc
              name: 'No SNMP response for {$SNMP.TIMEOUT}'
              expression: 'nodata(/Huawei ETP4860 Power System SNMP/sys.uptime,{$SNMP.TIMEOUT})=1'
              priority: HIGH
              description: 'No SNMP data received within {$SNMP.TIMEOUT}. Device may be unreachable or SNMP misconfigured.'
              tags:
                - tag: component
                  value: system
                - tag: scope
                  value: availability
            - uuid: a313154cbc5943129b5b47f6d1221352
              name: 'Device rebooted (uptime < 10 min)'
              expression: 'last(/Huawei ETP4860 Power System SNMP/sys.uptime)<600'
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: 'last(/Huawei ETP4860 Power System SNMP/sys.uptime)>=600'
              priority: INFO
              description: 'sysUpTime < 600 s. The device was recently rebooted.'
              tags:
                - tag: component
                  value: system
                - tag: scope
                  value: availability
        - uuid: fcd749a505b5427986b6c74dc42cc047
          name: 'Site running status'
          type: SNMP_AGENT
          snmp_oid: '1.3.6.1.4.1.2011.6.164.1.1.1.10.0'
          key: site.running.status
          delay: '60s'
          history: '7d'
          trends: '365d'
          value_type: UNSIGNED
          description: 'hwSiteRunningStatus. Overall alarm state of the site.'
          valuemap:
            name: 'Huawei ETP4860: hwSiteRunningStatus'
          tags:
            - tag: component
              value: system
            - tag: scope
              value: availability
          triggers:
            - uuid: 28a53401b1ab4088a3a7b43bb98fc439
              name: 'Site in alarm state'
              expression: 'last(/Huawei ETP4860 Power System SNMP/site.running.status)=2'
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: 'last(/Huawei ETP4860 Power System SNMP/site.running.status)=1'
              priority: HIGH
              description: 'hwSiteRunningStatus = alarm(2). One or more active alarms exist on the site.'
              tags:
                - tag: component
                  value: system
                - tag: scope
                  value: availability
        - uuid: 6fb7ab0f18904334b05ce1accc11d97a
          name: 'Site name'
          type: SNMP_AGENT
          snmp_oid: '1.3.6.1.4.1.2011.6.164.1.1.1.2.0'
          key: site.name
          delay: '3600s'
          history: '7d'
          trends: '0'
          value_type: CHAR
          tags:
            - tag: component
              value: system
            - tag: scope
              value: inventory
        - uuid: 21a5e1e355874e74894ed4b6cca92ecf
          name: 'Monitor module status'
          type: SNMP_AGENT
          snmp_oid: '1.3.6.1.4.1.2011.6.164.1.2.2.1.1.99.1'
          key: mon.oper.status
          delay: '60s'
          history: '7d'
          trends: '365d'
          value_type: UNSIGNED
          description: 'hwMonitorOperStatus (index 1). State of the site controller/monitor module.'
          valuemap:
            name: 'Huawei ETP4860: hwMonitorOperStatus'
          tags:
            - tag: component
              value: monitor
            - tag: scope
              value: availability
          triggers:
            - uuid: 6ce257a7482342c882f60674f712d747
              name: 'Monitor module fault'
              expression: 'last(/Huawei ETP4860 Power System SNMP/mon.oper.status)<>1'
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: 'last(/Huawei ETP4860 Power System SNMP/mon.oper.status)=1'
              priority: HIGH
              description: 'hwMonitorOperStatus != normal(1). The iSitePower controller is reporting a fault.'
              tags:
                - tag: component
                  value: monitor
                - tag: scope
                  value: availability
        - uuid: 3cc23899d0f747fca75ad225873c5c1f
          name: 'Monitor firmware version'
          type: SNMP_AGENT
          snmp_oid: '1.3.6.1.4.1.2011.6.164.1.2.2.1.1.5.1'
          key: mon.sw.version
          delay: '3600s'
          history: '7d'
          trends: '0'
          value_type: CHAR
          description: 'hwMonEquipSoftwareVersion (index 1).'
          tags:
            - tag: component
              value: monitor
            - tag: scope
              value: inventory
        # -- Rectifier Group Scalars --
        - uuid: 2c14ee0ceed24b5ea850d8227e2f20b7
          name: 'Rectifiers: Total DC output current'
          type: SNMP_AGENT
          snmp_oid: '1.3.6.1.4.1.2011.6.164.1.3.1.3.0'
          key: rect.group.current
          delay: '60s'
          history: '7d'
          trends: '365d'
          value_type: FLOAT
          units: A
          description: 'hwRectsTotalCurrent. Total DC output current of all rectifier modules. Raw ÷ 10 = A.'
          tags:
            - tag: component
              value: rectifier
            - tag: scope
              value: performance
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - 'return value==2147483647?0:value;'
            - type: MULTIPLIER
              parameters:
                - '0.1'
        - uuid: 16beada243ea4eaea8729648e45aaf97
          name: 'Rectifiers: Total quantity'
          type: SNMP_AGENT
          snmp_oid: '1.3.6.1.4.1.2011.6.164.1.3.1.4.0'
          key: rect.group.quantity
          delay: '3600s'
          history: '7d'
          trends: '365d'
          value_type: UNSIGNED
          units: pcs
          description: 'hwRectsTotalQuantity.'
          tags:
            - tag: component
              value: rectifier
            - tag: scope
              value: inventory
        - uuid: 92bf2265f30340818a012ddf2f707cad
          name: 'Rectifiers: Total DC power'
          type: SNMP_AGENT
          snmp_oid: '1.3.6.1.4.1.2011.6.164.1.3.1.9.0'
          key: rect.group.dc.power
          delay: '60s'
          history: '7d'
          trends: '365d'
          value_type: FLOAT
          units: W
          description: 'hwRectsTotalDCPower. Raw value is integer (W), no scaling.'
          tags:
            - tag: component
              value: rectifier
            - tag: scope
              value: performance
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - 'return value==2147483647?0:value;'
        - uuid: c216b6a962d24e95b22a7fd261f5be22
          name: 'Rectifiers: Total AC input power'
          type: SNMP_AGENT
          snmp_oid: '1.3.6.1.4.1.2011.6.164.1.3.1.11.0'
          key: rect.group.ac.power
          delay: '60s'
          history: '7d'
          trends: '365d'
          value_type: FLOAT
          units: W
          description: 'hwRectsTotalACInputPower. Total AC input power of all rectifier modules.'
          tags:
            - tag: component
              value: rectifier
            - tag: scope
              value: performance
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - 'return value==2147483647?0:value;'
        # -- Battery Group Scalars --
        - uuid: 44c3541e8cad41ceadea9b100a6fcd23
          name: 'Battery: Total bank current'
          type: SNMP_AGENT
          snmp_oid: '1.3.6.1.4.1.2011.6.164.1.4.2.1.0'
          key: batt.group.current
          delay: '60s'
          history: '7d'
          trends: '365d'
          value_type: FLOAT
          units: A
          description: 'hwBattsTotalCurrent. Positive = charging, negative = discharging. Raw ÷ 10 = A.'
          tags:
            - tag: component
              value: battery
            - tag: scope
              value: performance
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '0.1'
            - type: IN_RANGE
              parameters:
                - '-40000'
                - '40000'
              error_handler: DISCARD_VALUE
        - uuid: e6506765a9f147c1afa9ab3369f101e2
          name: 'Battery: Estimated backup time'
          type: SNMP_AGENT
          snmp_oid: '1.3.6.1.4.1.2011.6.164.1.4.2.2.0'
          key: batt.backup.time
          delay: '60s'
          history: '7d'
          trends: '365d'
          value_type: FLOAT
          units: h
          description: 'hwBattsPreDischargeTime. Battery backup time. MIB documents unit as minutes, but firmware reports in hours (confirmed by comparison with device display).'
          tags:
            - tag: component
              value: battery
            - tag: scope
              value: performance
          preprocessing:
            - type: IN_RANGE
              parameters:
                - '0'
                - '15360'
              error_handler: DISCARD_VALUE
          triggers:
            - uuid: d8ab37caf32f4f609725d67862d7fbd9
              name: 'Battery: Backup time below {$BATT.BACKUP.MIN} h'
              expression: 'last(/Huawei ETP4860 Power System SNMP/batt.backup.time)<={$BATT.BACKUP.MIN} and last(/Huawei ETP4860 Power System SNMP/batt.charge.status)=3'
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: 'last(/Huawei ETP4860 Power System SNMP/batt.backup.time)>{$BATT.BACKUP.MIN} or last(/Huawei ETP4860 Power System SNMP/batt.charge.status)<>3'
              priority: HIGH
              description: 'hwBattsPreDischargeTime < {$BATT.BACKUP.MIN} h. Estimated backup time is insufficient.'
              tags:
                - tag: component
                  value: battery
                - tag: scope
                  value: availability
        - uuid: d9a1951fe4e04d09a1c8ebfc67ed211d
          name: 'Battery: Charge status'
          type: SNMP_AGENT
          snmp_oid: '1.3.6.1.4.1.2011.6.164.1.4.2.3.0'
          key: batt.charge.status
          delay: '60s'
          history: '7d'
          trends: '365d'
          value_type: UNSIGNED
          description: 'hwBattsChargeStatus. Charge/discharge state of the battery group. hibernating(4) is operationally normal.'
          valuemap:
            name: 'Huawei ETP4860: hwBattsChargeStatus'
          tags:
            - tag: component
              value: battery
            - tag: scope
              value: availability
          triggers:
            - uuid: 2e144b79806048fcba030135a50eb56b
              name: 'Battery discharging'
              expression: 'last(/Huawei ETP4860 Power System SNMP/batt.charge.status)=3'
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: 'last(/Huawei ETP4860 Power System SNMP/batt.charge.status)<>3'
              priority: AVERAGE
              description: 'hwBattsChargeStatus = disCharge(3). Batteries are supplying load. Check for AC outage.'
              tags:
                - tag: component
                  value: battery
                - tag: scope
                  value: availability
        - uuid: 0035b98bc2704208b96bc538bc515481
          name: 'Battery: Remaining capacity'
          type: SNMP_AGENT
          snmp_oid: '1.3.6.1.4.1.2011.6.164.1.4.2.9.0'
          key: batt.remain.capacity
          delay: '60s'
          history: '7d'
          trends: '365d'
          value_type: FLOAT
          units: Ah
          description: 'hwBattsRemainCapacity. Remaining capacity of all battery strings.'
          tags:
            - tag: component
              value: battery
            - tag: scope
              value: performance
          preprocessing:
            - type: IN_RANGE
              parameters:
                - '0'
                - '2000000'
              error_handler: DISCARD_VALUE
        - uuid: 51111d287116485c8edef7869fe67642
          name: 'Battery: State of charge (%)'
          type: SNMP_AGENT
          snmp_oid: '1.3.6.1.4.1.2011.6.164.1.4.2.10.0'
          key: batt.remain.pct
          delay: '60s'
          history: '7d'
          trends: '365d'
          value_type: FLOAT
          units: '%'
          description: 'hwTotalRemainingCapacityPercent. Overall battery State-of-Charge (%).'
          tags:
            - tag: component
              value: battery
            - tag: scope
              value: performance
          triggers:
            - uuid: ce5122a5bc5e4215960a7c9ca547713d
              name: 'Battery: SOC below {$BATT.SOC.MIN}%'
              expression: 'last(/Huawei ETP4860 Power System SNMP/batt.remain.pct)<{$BATT.SOC.MIN}'
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: 'last(/Huawei ETP4860 Power System SNMP/batt.remain.pct)>={$BATT.SOC.MIN}'
              priority: HIGH
              description: 'hwTotalRemainingCapacityPercent < {$BATT.SOC.MIN}%. Battery bank is critically discharged. Recommended: add a manual dependency on trigger "Battery discharging" via the Zabbix UI after import.'
              tags:
                - tag: component
                  value: battery
                - tag: scope
                  value: availability
        # -- AC Group Scalars --
        - uuid: 255c14c98dcb4eb385d927856e033bab
          name: 'AC: Number of inputs'
          type: SNMP_AGENT
          snmp_oid: '1.3.6.1.4.1.2011.6.164.1.5.1.4.0'
          key: acs.input.quantity
          delay: '3600s'
          history: '7d'
          trends: '365d'
          value_type: UNSIGNED
          units: pcs
          description: 'hwAcsInputQuantity.'
          tags:
            - tag: component
              value: ac
            - tag: scope
              value: inventory
        # -- DC Group Scalars --
        - uuid: 3b438bd48ca846a1a22ba8ddfc5a9de2
          name: 'DC bus: Voltage'
          type: SNMP_AGENT
          snmp_oid: '1.3.6.1.4.1.2011.6.164.1.6.1.3.0'
          key: dcs.total.voltage
          delay: '60s'
          history: '7d'
          trends: '365d'
          value_type: FLOAT
          units: V
          description: 'hwDcsTotalVoltage. DC bus voltage. Raw ÷ 10 = V. Used as SNMP availability anchor.'
          tags:
            - tag: component
              value: dc
            - tag: scope
              value: performance
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '0.1'
            - type: IN_RANGE
              parameters:
                - '0'
                - '100'
              error_handler: DISCARD_VALUE
          triggers:
            - uuid: 2298f99cfb694760b82da861492dc0a2
              name: 'DC bus: Voltage below {$VDC.MIN} V'
              expression: 'max(/Huawei ETP4860 Power System SNMP/dcs.total.voltage,#3)<{$VDC.MIN}'
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: 'max(/Huawei ETP4860 Power System SNMP/dcs.total.voltage,#3)>={$VDC.MIN}'
              priority: HIGH
              description: 'hwDcsTotalVoltage persistently below {$VDC.MIN} V (last 3 samples). Risk of LVD disconnection.'
              tags:
                - tag: component
                  value: dc
                - tag: scope
                  value: availability
            - uuid: e46bd0631fa24626b3b88e407cb49394
              name: 'DC bus: Voltage above {$VDC.MAX} V'
              expression: 'min(/Huawei ETP4860 Power System SNMP/dcs.total.voltage,#3)>{$VDC.MAX}'
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: 'min(/Huawei ETP4860 Power System SNMP/dcs.total.voltage,#3)<={$VDC.MAX}'
              priority: WARNING
              description: 'hwDcsTotalVoltage persistently above {$VDC.MAX} V (last 3 samples). Risk of overvoltage damage.'
              tags:
                - tag: component
                  value: dc
                - tag: scope
                  value: availability
        - uuid: 6d19306cca784dbbbeba946c5a8bf926
          name: 'DC bus: Total current'
          type: SNMP_AGENT

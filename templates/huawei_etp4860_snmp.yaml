              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: 'last(/Huawei ETP4860 Power System SNMP/rect.oper.status[{#SNMPINDEX}])=1'
              priority: WARNING
              description: 'hwRectOperStatus = protect(3) or switchOff(5).'
              tags:
                - tag: component
                  value: rectifier
                - tag: scope
                  value: availability
            - uuid: tp000000000000000000000000000004
              name: 'Retificador {#RECTNAME}: Temperatura alta (>{$RECT.TEMP.MAX}°C)'
              expression: 'min(/Huawei ETP4860 Power System SNMP/rect.temperature[{#SNMPINDEX}],#3)>{$RECT.TEMP.MAX}'

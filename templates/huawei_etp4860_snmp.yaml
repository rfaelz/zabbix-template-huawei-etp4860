              delay: '60s'
              history: '7d'
              trends: '365d'
              value_type: FLOAT
              units: A
              description: 'hwBphaseCurrent. Phase B current. Raw ÷ 10 = A.'
              tags:
                - tag: component
                  value: ac
                - tag: scope
                  value: performance
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - 'return value==2147483647?0:value;'
                - type: MULTIPLIER
                  parameters:
                    - '0.1'
            - uuid: b7935d44161c4d33aa9e40dda0eb84cd
              name: 'AC input {#ACNAME}: Phase C current'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.2011.6.164.1.5.2.1.1.9.{#SNMPINDEX}'
              key: 'ac.curr.c[{#SNMPINDEX}]'
              delay: '60s'
              history: '7d'
              trends: '365d'
              value_type: FLOAT
              units: A
              description: 'hwCphaseCurrent. Phase C current. Raw ÷ 10 = A.'
              tags:
                - tag: component
                  value: ac
                - tag: scope
                  value: performance
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - 'return value==2147483647?0:value;'
                - type: MULTIPLIER
                  parameters:
                    - '0.1'
          trigger_prototypes:
            - uuid: ba8eb70d5b494f8bade6595a92a58c72
              name: 'AC input {#ACNAME}: AC power failure (acOff/phase absent)'
              expression: |
                last(/Huawei ETP4860 Power System SNMP/ac.input.oper.status[{#SNMPINDEX}])=2
                or last(/Huawei ETP4860 Power System SNMP/ac.input.oper.status[{#SNMPINDEX}])=3
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: 'last(/Huawei ETP4860 Power System SNMP/ac.input.oper.status[{#SNMPINDEX}])=1'
              priority: DISASTER
              description: 'hwAcInputOperStatus = acOff(2) or acAbsent(3). AC utility power failure.'
              tags:
                - tag: component
                  value: ac
                - tag: scope
                  value: availability
            - uuid: 42c4bd9d98c74ea499a38e9170fb569d
              name: 'AC input {#ACNAME}: AC voltage out of range'
              expression: |
                min(/Huawei ETP4860 Power System SNMP/ac.volt.a[{#SNMPINDEX}],#3)>{$AC.VOLT.MAX}
                or max(/Huawei ETP4860 Power System SNMP/ac.volt.a[{#SNMPINDEX}],#3)<{$AC.VOLT.MIN}
                or min(/Huawei ETP4860 Power System SNMP/ac.volt.b[{#SNMPINDEX}],#3)>{$AC.VOLT.MAX}
                or max(/Huawei ETP4860 Power System SNMP/ac.volt.b[{#SNMPINDEX}],#3)<{$AC.VOLT.MIN}
                or min(/Huawei ETP4860 Power System SNMP/ac.volt.c[{#SNMPINDEX}],#3)>{$AC.VOLT.MAX}
                or max(/Huawei ETP4860 Power System SNMP/ac.volt.c[{#SNMPINDEX}],#3)<{$AC.VOLT.MIN}
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: |
                min(/Huawei ETP4860 Power System SNMP/ac.volt.a[{#SNMPINDEX}],#3)<={$AC.VOLT.MAX}
                and max(/Huawei ETP4860 Power System SNMP/ac.volt.a[{#SNMPINDEX}],#3)>={$AC.VOLT.MIN}
                and min(/Huawei ETP4860 Power System SNMP/ac.volt.b[{#SNMPINDEX}],#3)<={$AC.VOLT.MAX}
                and max(/Huawei ETP4860 Power System SNMP/ac.volt.b[{#SNMPINDEX}],#3)>={$AC.VOLT.MIN}
                and min(/Huawei ETP4860 Power System SNMP/ac.volt.c[{#SNMPINDEX}],#3)<={$AC.VOLT.MAX}
                and max(/Huawei ETP4860 Power System SNMP/ac.volt.c[{#SNMPINDEX}],#3)>={$AC.VOLT.MIN}
              priority: WARNING
              description: 'Any AC phase voltage persistently outside [{$AC.VOLT.MIN}, {$AC.VOLT.MAX}] V (last 3 samples).'
              tags:
                - tag: component
                  value: ac
                - tag: scope
                  value: performance

            - uuid: ip000000000000000000000000000008
              name: 'Retificador {#RECTNAME}: Temperatura'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.2011.6.164.1.3.2.2.1.8.{#SNMPINDEX}'
              key: 'rect.temperature[{#SNMPINDEX}]'
              delay: '60s'
              history: '7d'
              trends: '365d'
              value_type: FLOAT
              units: °C
              description: 'hwRectifierTemperature. Raw ÷ 10 = °C. 2147483647 = invalid (discarded).'
              tags:
                - tag: component
                  value: rectifier
                - tag: scope
                  value: performance
              preprocessing:
